# ML Company Pipeline Configuration
project:
  name: "Customer Churn Prediction"
  version: "1.0.0"
  environment: "production"

data:
  source_file: "data/fictitious_company_data.xlsx"
  target_column: "churn"
  test_size: 0.2
  random_state: 42
  
features:
  numerical_features:
    - age
    - tenure_months
    - monthly_spend
    - support_tickets
    - last_login_days
    - satisfaction_score
  
  categorical_features:
    - gender
    - contract_type
  
  id_columns:
    - customer_id

models:
  logistic_regression:
    class: "LogisticRegression"
    params:
      C: 1.0
      max_iter: 1000
      random_state: 42
  
  random_forest:
    class: "RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
  
  xgboost:
    class: "XGBClassifier"
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      random_state: 42

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
  cv_folds: 5
  
drift_detection:
  psi_threshold: 0.1
  ks_threshold: 0.05
  reference_window_days: 30
  current_window_days: 7
  
api:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  
artifacts:
  raw_data: "artifacts/raw_data.pkl"
  X_train: "artifacts/X_train.pkl"
  X_test: "artifacts/X_test.pkl"
  y_train: "artifacts/y_train.pkl"
  y_test: "artifacts/y_test.pkl"
  X_train_fe: "artifacts/X_train_fe.pkl"
  X_test_fe: "artifacts/X_test_fe.pkl"
  encoders: "artifacts/encoders.pkl"
  scaler: "artifacts/scaler.pkl"
  feature_names: "artifacts/feature_names.pkl"
  fe_params: "artifacts/fe_params.pkl"
  model: "artifacts/model.pkl"
  metrics: "artifacts/metrics.json"
  best_model: "artifacts/best_model.json"
  drift_report: "reports/drift_report.json"
