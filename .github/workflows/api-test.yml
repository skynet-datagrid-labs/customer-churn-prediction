name: API Testing

on:
  push:
    paths:
      - 'api/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: Create dummy model for testing
        run: |
          mkdir -p artifacts/models
          python -c "
          import joblib
          from sklearn.ensemble import RandomForestClassifier
          import pandas as pd
          import numpy as np
          X = pd.DataFrame(np.random.rand(100, 8))
          y = np.random.randint(0, 2, 100)
          model = RandomForestClassifier()
          model.fit(X, y)
          joblib.dump(model, 'artifacts/models/best_model.pkl')
          from sklearn.preprocessing import StandardScaler
          import joblib
          scaler = StandardScaler()
          scaler.fit(X)
          joblib.dump(scaler, 'artifacts/models/preprocessor.pkl')
          "
      
      - name: Start API server
        run: |
          nohup uvicorn api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: Run tests
        run: pytest tests/test_api.py -v --cov=api --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
