name: API Testing

on:
  push:
    paths:
      - 'api/**'
      - 'tests/test_api.py'
  pull_request:
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-api-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: Create dummy model for testing
        run: |
          mkdir -p artifacts/models
          python -c "
          import joblib
          from sklearn.ensemble import RandomForestClassifier
          import pandas as pd
          import numpy as np
          X = pd.DataFrame(np.random.rand(100, 8))
          y = np.random.randint(0, 2, 100)
          model = RandomForestClassifier()
          model.fit(X, y)
          joblib.dump(model, 'artifacts/models/best_model.pkl')
          "
      
      - name: Start API server
        run: |
          nohup uvicorn api.app:app --host 127.0.0.1 --port 8000 &
          sleep 5
      
      - name: Test API endpoints
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/ || exit 1
      
      - name: Run pytest
        run: |
          pytest tests/test_api.py -v --cov=api --cov-report=xml --cov-report=term
      
      - name: Load test with multiple requests
        run: |
          python -c "
          import requests
          import time
          import statistics
          
          urls = ['http://localhost:8000/health', 'http://localhost:8000/']
          for url in urls:
              times = []
              for i in range(10):
                  start = time.time()
                  response = requests.get(url)
                  end = time.time()
                  times.append(end - start)
              print(f'{url}: Avg response time: {statistics.mean(times):.3f}s')
          "
      
      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: api-tests
      
      - name: API test summary
        run: |
          echo "## API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Python version: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- All tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Response times within SLA" >> $GITHUB_STEP_SUMMARY
