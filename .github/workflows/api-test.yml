name: API Testing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'api/**'
      - 'tests/test_api.py'

jobs:
  test-api-endpoints:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: Create mock model for testing
        run: |
          python -c "
          import pickle
          from sklearn.ensemble import RandomForestClassifier
          import numpy as np
          import os
          
          os.makedirs('artifacts/models', exist_ok=True)
          
          mock_model = RandomForestClassifier(n_estimators=10, random_state=42)
          X_mock = np.random.rand(100, 10)
          y_mock = np.random.randint(0, 2, 100)
          mock_model.fit(X_mock, y_mock)
          
          with open('artifacts/models/final_model.pkl', 'wb') as f:
              pickle.dump(mock_model, f)
          
          from sklearn.preprocessing import StandardScaler
          mock_scaler = StandardScaler()
          mock_scaler.fit(X_mock)
          
          with open('artifacts/models/final_preprocessor.pkl', 'wb') as f:
              pickle.dump({'scaler': mock_scaler}, f)
          
          print('Mock models created')
          "
      
      - name: Start API server
        run: |
          uvicorn api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: Run API tests
        run: |
          pytest tests/test_api.py -v --tb=short --cov=api --cov-report=xml
      
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
          overwrite: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            .pytest_cache/
            coverage.xml
          retention-days: 7
          overwrite: true
