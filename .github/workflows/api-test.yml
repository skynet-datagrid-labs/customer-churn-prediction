name: api-test

on:
  push:
    paths:
      - "api/**"
      - "tests/**"
  pull_request:

permissions:
  contents: read

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: API test placeholder
        run: python -m unittest discover -s tests -q
