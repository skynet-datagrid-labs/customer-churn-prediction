name: Scheduled Retraining

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  generate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python scripts/generate_data.py
      - uses: actions/upload-artifact@v4
        with:
          name: data
          path: data/

  ingest-data:
    needs: generate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data/
      - run: pip install -r requirements.txt
      - run: python src/ingest.py data/fictitious_company_data.xlsx
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: artifacts/raw_data.pkl

  validate-data:
    needs: ingest-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/validate.py

  preprocess-data:
    needs: validate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/preprocess.py
      - uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: |
            artifacts/X_train.pkl
            artifacts/X_test.pkl
            artifacts/y_train.pkl
            artifacts/y_test.pkl
            artifacts/encoders.pkl

  feature-engineering:
    needs: preprocess-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/feature_engineering.py
      - uses: actions/upload-artifact@v4
        with:
          name: feature-data
          path: |
            artifacts/X_train_fe.pkl
            artifacts/X_test_fe.pkl
            artifacts/scaler.pkl

  train-logistic-regression:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py logistic_regression
      - uses: actions/upload-artifact@v4
        with:
          name: model-lr
          path: artifacts/model_logistic_regression.pkl

  train-random-forest:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py random_forest
      - uses: actions/upload-artifact@v4
        with:
          name: model-rf
          path: artifacts/model_random_forest.pkl

  train-xgboost:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py xgboost
      - uses: actions/upload-artifact@v4
        with:
          name: model-xgb
          path: artifacts/model_xgboost.pkl

  evaluate-models:
    needs: [train-logistic-regression, train-random-forest, train-xgboost]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-lr
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-rf
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-xgb
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: |
          python src/evaluate.py logistic_regression
          python src/evaluate.py random_forest
          python src/evaluate.py xgboost
      - uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: artifacts/metrics_*.json

  select-best-model:
    needs: evaluate-models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: metrics
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/select_model.py
      - uses: actions/upload-artifact@v4
        with:
          name: best-model-info
          path: artifacts/best_model.json

  save-artifacts:
    needs: [select-best-model, feature-engineering]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: best-model-info
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: metrics
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-lr
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-rf
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-xgb
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/save_model.py
      - uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: |
            artifacts/model.pkl
            artifacts/metrics.json
            reports/
          retention-days: 30
