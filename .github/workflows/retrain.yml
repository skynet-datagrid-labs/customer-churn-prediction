name: Model Retraining

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  retrain-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Load current best model
        run: |
          mkdir -p artifacts/models
          if [ -f "artifacts/models/best_model.pkl" ]; then
            echo "Current best model exists, will retrain with new data"
          else
            echo "No existing model found, will train from scratch"
          fi
      
      - name: Ingest new data
        run: python src/ingest.py --retraining
      
      - name: Validate new data
        run: python src/validate.py --retraining
      
      - name: Preprocess new data
        run: python src/preprocess.py --retraining
      
      - name: Feature engineering
        run: python src/feature_engineering.py --retraining
      
      - name: Retrain models
        run: |
          python src/train.py --model logistic_regression --retraining
          python src/train.py --model random_forest --retraining
          python src/train.py --model xgboost --retraining
      
      - name: Evaluate retrained models
        run: python src/evaluate.py --retraining
      
      - name: Compare with production model
        run: python src/select_model.py --retraining --compare
      
      - name: Deploy new model if better
        run: |
          python -c "
          import json
          with open('artifacts/reports/model_comparison.json') as f:
              comparison = json.load(f)
          if comparison['new_model_better']:
              print('New model outperforms production, deploying...')
              with open('artifacts/deploy_flag', 'w') as f:
                  f.write('deploy')
          else:
              print('No significant improvement, skipping deployment')
          "
      
      - name: Update production model
        if: success()
        run: |
          if [ -f "artifacts/deploy_flag" ]; then
            cp artifacts/models/best_model_new.pkl artifacts/models/best_model.pkl
            echo "Production model updated"
          fi
      
      - name: Retraining complete
        run: |
          echo "Retraining pipeline completed successfully" >> retraining.log
          date >> retraining.log
