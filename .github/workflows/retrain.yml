name: Model Retraining

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download production model
        uses: actions/download-artifact@v4
        with:
          name: best-model
          path: artifacts/models/
        continue-on-error: true
      
      - name: Run complete retraining pipeline
        run: |
          python src/ingest.py --retraining
          python src/validate.py --retraining
          python src/preprocess.py --retraining
          python src/feature_engineering.py --retraining
          python src/train.py --model logistic_regression --retraining
          python src/train.py --model random_forest --retraining
          python src/train.py --model xgboost --retraining
          python src/evaluate.py --retraining
          python src/select_model.py --retraining --compare
      
      - name: Upload retrained model
        uses: actions/upload-artifact@v4
        with:
          name: retrained-model
          path: artifacts/models/best_model.pkl
      
      - name: Retraining summary
        run: |
          echo "## Model Retraining Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Retraining triggered: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- New model available in artifacts" >> $GITHUB_STEP_SUMMARY
