name: ML Company Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        id: cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create artifact directories
        run: |
          mkdir -p artifacts/models
          mkdir -p artifacts/reports
          mkdir -p artifacts/metrics
          mkdir -p artifacts/plots
      
      - name: Upload directories
        uses: actions/upload-artifact@v3
        with:
          name: project-structure
          path: |
            artifacts/
            src/
            config/
          retention-days: 7

  ingest-data:
    runs-on: ubuntu-latest
    needs: [setup-environment]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run data ingestion
        run: python src/ingest.py
      
      - name: Upload ingested data
        uses: actions/upload-artifact@v3
        with:
          name: ingested-data
          path: artifacts/data/
          retention-days: 7

  validate-data:
    runs-on: ubuntu-latest
    needs: [ingest-data]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download ingested data
        uses: actions/download-artifact@v3
        with:
          name: ingested-data
          path: artifacts/data/
      
      - name: Run data validation
        run: python src/validate.py
      
      - name: Upload validation report
        uses: actions/upload-artifact@v3
        with:
          name: validation-report
          path: artifacts/reports/validation_report.json
          retention-days: 7

  preprocess-data:
    runs-on: ubuntu-latest
    needs: [validate-data]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download ingested data
        uses: actions/download-artifact@v3
        with:
          name: ingested-data
          path: artifacts/data/
      
      - name: Run preprocessing
        run: python src/preprocess.py
      
      - name: Upload preprocessed data
        uses: actions/upload-artifact@v3
        with:
          name: preprocessed-data
          path: artifacts/data/preprocessed_data.pkl
          retention-days: 7

  feature-engineering:
    runs-on: ubuntu-latest
    needs: [preprocess-data]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download preprocessed data
        uses: actions/download-artifact@v3
        with:
          name: preprocessed-data
          path: artifacts/data/
      
      - name: Run feature engineering
        run: python src/feature_engineering.py
      
      - name: Upload features
        uses: actions/upload-artifact@v3
        with:
          name: engineered-features
          path: artifacts/data/features.pkl
          retention-days: 7

  train-models:
    runs-on: ubuntu-latest
    needs: [feature-engineering]
    strategy:
      matrix:
        model: [logistic_regression, random_forest, xgboost]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download features
        uses: actions/download-artifact@v3
        with:
          name: engineered-features
          path: artifacts/data/
      
      - name: Train ${{ matrix.model }}
        run: python src/train.py --model ${{ matrix.model }}
      
      - name: Upload ${{ matrix.model }} model
        uses: actions/upload-artifact@v3
        with:
          name: model-${{ matrix.model }}
          path: artifacts/models/${{ matrix.model }}.pkl
          retention-days: 7
      
      - name: Upload ${{ matrix.model }} metrics
        uses: actions/upload-artifact@v3
        with:
          name: metrics-${{ matrix.model }}
          path: artifacts/metrics/${{ matrix.model }}_metrics.json
          retention-days: 7

  evaluate-models:
    runs-on: ubuntu-latest
    needs: [train-models]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download all models
        uses: actions/download-artifact@v3
        with:
          path: artifacts/
      
      - name: Run evaluation
        run: python src/evaluate.py
      
      - name: Upload evaluation report
        uses: actions/upload-artifact@v3
        with:
          name: evaluation-report
          path: artifacts/reports/evaluation_report.json
          retention-days: 7

  select-best-model:
    runs-on: ubuntu-latest
    needs: [evaluate-models]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download evaluation report
        uses: actions/download-artifact@v3
        with:
          name: evaluation-report
          path: artifacts/reports/
      
      - name: Select best model
        run: python src/select_model.py
      
      - name: Upload best model info
        uses: actions/upload-artifact@v3
        with:
          name: best-model-info
          path: artifacts/models/best_model_info.json
          retention-days: 7

  save-artifacts:
    runs-on: ubuntu-latest
    needs: [select-best-model]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download best model
        uses: actions/download-artifact@v3
        with:
          name: model-*
          path: artifacts/models/
      
      - name: Download best model info
        uses: actions/download-artifact@v3
        with:
          name: best-model-info
          path: artifacts/models/
      
      - name: Save final artifacts
        run: python src/save_model.py
      
      - name: Upload final artifacts
        uses: actions/upload-artifact@v3
        with:
          name: final-artifacts
          path: |
            artifacts/models/final_model.pkl
            artifacts/models/final_preprocessor.pkl
            artifacts/models/model_metadata.json
          retention-days: 30

  generate-reports:
    runs-on: ubuntu-latest
    needs: [evaluate-models, select-best-model]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download all metrics
        uses: actions/download-artifact@v3
        with:
          path: artifacts/
      
      - name: Generate reports and plots
        run: |
          python -c "
          import json
          import matplotlib.pyplot as plt
          import seaborn as sns
          import pandas as pd
          import numpy as np
          
          # Generate performance comparison plot
          models = ['logistic_regression', 'random_forest', 'xgboost']
          metrics_data = {}
          
          for model in models:
              try:
                  with open(f'artifacts/metrics/{model}_metrics.json', 'r') as f:
                      metrics_data[model] = json.load(f)
              except:
                  pass
          
          if metrics_data:
              fig, axes = plt.subplots(2, 2, figsize=(12, 10))
              metrics_names = ['accuracy', 'precision', 'recall', 'f1_score']
              
              for idx, metric in enumerate(metrics_names):
                  ax = axes[idx//2, idx%2]
                  values = [metrics_data[m].get(metric, 0) for m in models if m in metrics_data]
                  ax.bar([m for m in models if m in metrics_data], values)
                  ax.set_title(f'{metric.upper()} Comparison')
                  ax.set_ylim([0, 1])
                  ax.set_ylabel('Score')
                  ax.tick_params(axis='x', rotation=45)
              
              plt.tight_layout()
              plt.savefig('artifacts/plots/model_comparison.png', dpi=100, bbox_inches='tight')
              plt.close()
              
              # Generate metrics heatmap
              metrics_df = pd.DataFrame(metrics_data).T
              plt.figure(figsize=(10, 6))
              sns.heatmap(metrics_df, annot=True, cmap='YlOrRd', fmt='.3f', cbar_kws={'label': 'Score'})
              plt.title('Model Performance Heatmap')
              plt.tight_layout()
              plt.savefig('artifacts/plots/performance_heatmap.png', dpi=100)
              plt.close()
          "
      
      - name: Upload reports and plots
        uses: actions/upload-artifact@v3
        with:
          name: reports-and-plots
          path: |
            artifacts/plots/
            artifacts/reports/
          retention-days: 30

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: [generate-reports, save-artifacts]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: all-artifacts/
      
      - name: Organize artifacts
        run: |
          mkdir -p final_artifacts/models
          mkdir -p final_artifacts/plots
          mkdir -p final_artifacts/metrics
          mkdir -p final_artifacts/reports
          
          cp -r all-artifacts/final-artifacts/* final_artifacts/models/ 2>/dev/null || true
          cp -r all-artifacts/reports-and-plots/plots/* final_artifacts/plots/ 2>/dev/null || true
          cp -r all-artifacts/reports-and-plots/artifacts/reports/* final_artifacts/reports/ 2>/dev/null || true
          cp -r all-artifacts/evaluation-report/* final_artifacts/reports/ 2>/dev/null || true
          
          # Create artifact manifest
          echo "{\"timestamp\": \"$(date -Iseconds)\", \"artifacts\": $(ls -R final_artifacts | jq -R -s -c split(\"\\n\"))}" > final_artifacts/manifest.json
      
      - name: Upload to GitHub Release
        uses: actions/upload-artifact@v3
        with:
          name: complete-pipeline-artifacts
          path: final_artifacts/
          retention-days: 90

  build-docker-image:
    runs-on: ubuntu-latest
    needs: [save-artifacts]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Download final model
        uses: actions/download-artifact@v3
        with:
          name: final-artifacts
          path: artifacts/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t ml-company-api:latest .
          docker save ml-company-api:latest | gzip > ml-company-api.tar.gz
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: ml-company-api.tar.gz
          retention-days: 7

  deploy-api:
    runs-on: ubuntu-latest
    needs: [build-docker-image]
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v3
        with:
          name: docker-image
      
      - name: Load Docker image
        run: |
          gunzip -c ml-company-api.tar.gz | docker load
      
      - name: Run API container
        run: |
          docker run -d --name ml-api -p 8000:8000 ml-company-api:latest
          sleep 10
      
      - name: Verify API is running
        run: |
          curl -f http://localhost:8000/health || exit 1
      
      - name: Save container state for testing
        run: docker commit ml-api ml-api-running
      
      - name: Upload running container info
        uses: actions/upload-artifact@v3
        with:
          name: running-api
          path: /var/run/docker.sock
          retention-days: 1

  test-api:
    runs-on: ubuntu-latest
    needs: [deploy-api]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install test dependencies
        run: |
          pip install pytest httpx
          pip install -r requirements.txt
      
      - name: Download running API info
        uses: actions/download-artifact@v3
        with:
          name: running-api
      
      - name: Run API tests
        run: |
          pytest tests/test_api.py -v --tb=short
        env:
          API_URL: http://localhost:8000
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: api-test-results
          path: |
            test_results.xml
            pytest_output.txt
          retention-days: 7

  drift-detection:
    runs-on: ubuntu-latest
    needs: [save-artifacts]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download reference data
        uses: actions/download-artifact@v3
        with:
          name: engineered-features
          path: reference_data/
      
      - name: Download current data
        uses: actions/download-artifact@v3
        with:
          name: ingested-data
          path: current_data/
      
      - name: Run drift detection
        run: python src/drift.py
      
      - name: Upload drift report
        uses: actions/upload-artifact@v3
        with:
          name: drift-report
          path: artifacts/reports/drift_report.json
          retention-days: 30
      
      - name: Check if retraining needed
        id: check_drift
        run: |
          if [ -f artifacts/reports/drift_report.json ]; then
            DRIFT_SCORE=$(python -c "import json; data=json.load(open('artifacts/reports/drift_report.json')); print(data.get('drift_detected', False))")
            if [ "$DRIFT_SCORE" = "True" ]; then
              echo "retrain_needed=true" >> $GITHUB_OUTPUT
            else
              echo "retrain_needed=false" >> $GITHUB_OUTPUT
            fi
          fi

  retrain-trigger:
    runs-on: ubuntu-latest
    needs: [drift-detection]
    if: needs.drift-detection.outputs.retrain_needed == 'true'
    steps:
      - name: Trigger retraining workflow
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'retrain.yml',
              ref: 'main',
              inputs: {
                reason: 'Data drift detected'
              }
            })
      
      - name: Log retraining trigger
        run: |
          echo "Retraining triggered due to data drift at $(date)" >> artifacts/reports/retraining_log.txt
      
      - name: Upload retraining log
        uses: actions/upload-artifact@v3
        with:
          name: retraining-log
          path: artifacts/reports/retraining_log.txt

  notify:
    runs-on: ubuntu-latest
    needs: [test-api, drift-detection, save-artifacts]
    if: always()
    steps:
      - name: Create notification summary
        run: |
          cat > notification.md << 'EOF'
          # ML Pipeline Execution Summary
          
          **Status:** ${{ job.status }}
          **Timestamp:** $(date)
          **Run ID:** ${{ github.run_id }}
          
          ## Pipeline Stages
          - ✅ Setup Environment
          - ✅ Data Ingestion
          - ✅ Validation
          - ✅ Preprocessing
          - ✅ Feature Engineering
          - ✅ Model Training (3 models)
          - ✅ Evaluation
          - ✅ Model Selection
          - ✅ Artifact Saving
          - ✅ Report Generation
          - ✅ Docker Build
          - ✅ API Deployment
          - ${{ needs.test-api.result == 'success' && '✅' || '❌' }} API Testing
          - ${{ needs.drift-detection.result == 'success' && '✅' || '⚠️' }} Drift Detection
          
          ## Model Performance
          Best Model: $(cat artifacts/models/best_model_info.json 2>/dev/null | jq -r '.best_model' || echo "N/A")
          Best F1 Score: $(cat artifacts/models/best_model_info.json 2>/dev/null | jq -r '.metrics.f1_score' || echo "N/A")
          
          ## Artifacts
          - Models saved in artifacts/models/
          - Reports in artifacts/reports/
          - Plots in artifacts/plots/
          
          View full details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          
          cat notification.md >> $GITHUB_STEP_SUMMARY
      
      - name: Log completion
        run: |
          echo "Pipeline completed successfully at $(date)" >> pipeline_completion.log
          echo "All jobs executed as expected"
      
      - name: Upload completion log
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-completion
          path: pipeline_completion.log
