name: ML Production Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly retraining
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify installation
        run: |
          python -c "import sklearn; import pandas; import numpy; import xgboost; import fastapi; import yaml"
      
      - name: Cache environment info
        uses: actions/upload-artifact@v4
        with:
          name: environment
          path: |
            requirements.txt
            .github/workflows/*.yml
          retention-days: 7

  ingest-data:
    runs-on: ubuntu-latest
    needs: [setup-environment]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create data directory
        run: mkdir -p artifacts/data
      
      - name: Verify data file exists
        run: |
          if [ ! -f "data/fictitious_company_data.xlsx" ]; then
            echo "Creating sample data file for testing"
            python -c "
            import pandas as pd
            import numpy as np
            np.random.seed(42)
            n = 1000
            df = pd.DataFrame({
                'customer_id': range(1, n+1),
                'age': np.random.randint(18, 65, n),
                'gender': np.random.choice(['Male', 'Female'], n),
                'tenure_months': np.random.randint(1, 60, n),
                'monthly_spend': np.random.uniform(10, 500, n),
                'contract_type': np.random.choice(['Monthly', 'Yearly'], n),
                'support_tickets': np.random.poisson(2, n),
                'last_login_days': np.random.randint(0, 90, n),
                'satisfaction_score': np.random.randint(1, 11, n),
                'churn': np.random.choice([0, 1], n, p=[0.7, 0.3])
            })
            df.to_excel('data/fictitious_company_data.xlsx', index=False)
            print('Sample data created')
            "
          fi
      
      - name: Run data ingestion
        run: python src/ingest.py
      
      - name: Upload raw data
        uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: artifacts/data/raw_data.csv
          retention-days: 7

  validate-data:
    runs-on: ubuntu-latest
    needs: [ingest-data]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download raw data
        uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/data/
      
      - name: Run validation
        run: python src/validate.py
      
      - name: Upload validated data
        uses: actions/upload-artifact@v4
        with:
          name: validated-data
          path: artifacts/data/validated_data.csv
      
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: artifacts/reports/validation_report.json

  preprocess-data:
    runs-on: ubuntu-latest
    needs: [validate-data]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download validated data
        uses: actions/download-artifact@v4
        with:
          name: validated-data
          path: artifacts/data/
      
      - name: Run preprocessing
        run: python src/preprocess.py
      
      - name: Upload preprocessed data
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: artifacts/data/preprocessed_data.csv
      
      - name: Upload preprocessor
        uses: actions/upload-artifact@v4
        with:
          name: preprocessor
          path: artifacts/models/preprocessor.pkl

  feature-engineering:
    runs-on: ubuntu-latest
    needs: [preprocess-data]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download preprocessed data
        uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: artifacts/data/
      
      - name: Run feature engineering
        run: python src/feature_engineering.py
      
      - name: Upload feature data
        uses: actions/upload-artifact@v4
        with:
          name: feature-data
          path: artifacts/data/feature_data.csv
      
      - name: Upload feature info
        uses: actions/upload-artifact@v4
        with:
          name: feature-info
          path: artifacts/reports/feature_info.json

  train-models:
    runs-on: ubuntu-latest
    needs: [feature-engineering]
    strategy:
      matrix:
        model: [logistic_regression, random_forest, xgboost]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download feature data
        uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/data/
      
      - name: Train ${{ matrix.model }}
        run: python src/train.py --model ${{ matrix.model }}
      
      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ matrix.model }}
          path: artifacts/models/${{ matrix.model }}.pkl
      
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.model }}
          path: artifacts/metrics/${{ matrix.model }}_metrics.json

  evaluate-models:
    runs-on: ubuntu-latest
    needs: [train-models]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download all models
        uses: actions/download-artifact@v4
        with:
          pattern: model-*
          path: artifacts/models/
          merge-multiple: true
      
      - name: Download all metrics
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: artifacts/metrics/
          merge-multiple: true
      
      - name: Download feature data
        uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/data/
      
      - name: Run evaluation
        run: python src/evaluate.py
      
      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: artifacts/reports/evaluation_report.json

  select-best-model:
    runs-on: ubuntu-latest
    needs: [evaluate-models]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download evaluation report
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: artifacts/reports/
      
      - name: Download all models
        uses: actions/download-artifact@v4
        with:
          pattern: model-*
          path: artifacts/models/
          merge-multiple: true
      
      - name: Select best model
        run: python src/select_model.py
      
      - name: Upload best model
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: artifacts/models/best_model.pkl
      
      - name: Upload model selection report
        uses: actions/upload-artifact@v4
        with:
          name: model-selection
          path: artifacts/reports/model_selection.json

  save-artifacts:
    runs-on: ubuntu-latest
    needs: [select-best-model]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download best model
        uses: actions/download-artifact@v4
        with:
          name: best-model
          path: artifacts/models/
      
      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: artifacts/models/
      
      - name: Download feature info
        uses: actions/download-artifact@v4
        with:
          name: feature-info
          path: artifacts/reports/
      
      - name: Download evaluation report
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: artifacts/reports/
      
      - name: Save all artifacts with metadata
        run: python src/save_model.py
      
      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: artifacts/
          retention-days: 30

  generate-reports:
    runs-on: ubuntu-latest
    needs: [evaluate-models, save-artifacts]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download evaluation report
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: artifacts/reports/
      
      - name: Generate confusion matrix and plots
        run: |
          python -c "
          import json
          import matplotlib.pyplot as plt
          import seaborn as sns
          import pandas as pd
          import numpy as np
          from sklearn.metrics import confusion_matrix
          
          # Load evaluation results
          with open('artifacts/reports/evaluation_report.json', 'r') as f:
              eval_data = json.load(f)
          
          # Create confusion matrix plot
          if 'best_model_metrics' in eval_data and 'confusion_matrix' in eval_data['best_model_metrics']:
              cm = np.array(eval_data['best_model_metrics']['confusion_matrix'])
              plt.figure(figsize=(8, 6))
              sns.heatmap(cm, annot=True, fmt='d', cmap='Blues')
              plt.title('Confusion Matrix - Best Model')
              plt.ylabel('True Label')
              plt.xlabel('Predicted Label')
              plt.savefig('artifacts/plots/confusion_matrix.png')
              print('Confusion matrix saved')
          
          # Create model comparison bar chart
          if 'comparison' in eval_data:
              models = list(eval_data['comparison'].keys())
              metrics = ['accuracy', 'precision', 'recall', 'f1_score']
              
              fig, axes = plt.subplots(2, 2, figsize=(12, 10))
              axes = axes.flatten()
              
              for idx, metric in enumerate(metrics):
                  values = [eval_data['comparison'][model].get(metric, 0) for model in models]
                  axes[idx].bar(models, values, color=['#1f77b4', '#2ca02c', '#ff7f0e'])
                  axes[idx].set_title(f'{metric.capitalize()} Comparison')
                  axes[idx].set_ylim([0, 1])
                  axes[idx].set_ylabel(metric.capitalize())
                  axes[idx].grid(True, alpha=0.3)
                  
                  for i, v in enumerate(values):
                      axes[idx].text(i, v + 0.02, f'{v:.3f}', ha='center')
              
              plt.tight_layout()
              plt.savefig('artifacts/plots/model_comparison.png')
              print('Model comparison plot saved')
          "
      
      - name: Upload plots
        uses: actions/upload-artifact@v4
        with:
          name: plots
          path: artifacts/plots/

  upload-artifacts:
    runs-on: ubuntu-latest
    needs: [generate-reports, save-artifacts]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download final artifacts
        uses: actions/download-artifact@v4
        with:
          name: final-artifacts
          path: artifacts/
      
      - name: Download plots
        uses: actions/download-artifact@v4
        with:
          name: plots
          path: artifacts/plots/
      
      - name: Create release archive
        run: |
          tar -czf ml-pipeline-artifacts.tar.gz artifacts/
          echo "Artifacts packaged successfully"
      
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ml-pipeline-artifacts.tar.gz
          tag_name: artifacts-${{ github.run_number }}
          name: "ML Pipeline Artifacts - Run #${{ github.run_number }}"
          body: |
            ## ML Pipeline Execution Results
            
            - **Run ID**: ${{ github.run_id }}
            - **Trigger**: ${{ github.event_name }}
            - **Timestamp**: $(date)
            
            ### Contents:
            - Trained models (.pkl files)
            - Evaluation metrics (JSON)
            - Performance plots (PNG)
            - Validation reports
            - Feature engineering outputs

  build-docker-image:
    runs-on: ubuntu-latest
    needs: [save-artifacts]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download best model
        uses: actions/download-artifact@v4
        with:
          name: best-model
          path: artifacts/models/
      
      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: artifacts/models/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ml-api:latest
            ghcr.io/${{ github.repository }}/ml-api:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    runs-on: ubuntu-latest
    needs: [build-docker-image]
    steps:
      - uses: actions/checkout@v4
      
      - name: Simulate API deployment
        run: |
          mkdir -p deployment
          cat > deployment/deployment_info.json << EOF
          {
            "deployment_id": "${{ github.run_id }}",
            "timestamp": "$(date -Iseconds)",
            "image": "ghcr.io/${{ github.repository }}/ml-api:${{ github.run_number }}",
            "status": "deployed",
            "endpoints": {
              "health": "/health",
              "predict": "/predict",
              "docs": "/docs"
            }
          }
          EOF
          echo "API deployment simulation complete"
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment/

  test-api:
    runs-on: ubuntu-latest
    needs: [deploy-api]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: Download best model for testing
        uses: actions/download-artifact@v4
        with:
          name: best-model
          path: artifacts/models/
      
      - name: Download preprocessor
        uses: actions/download-artifact@v4
        with:
          name: preprocessor
          path: artifacts/models/
      
      - name: Start API server
        run: |
          nohup uvicorn api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5
      
      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short
      
      - name: Test prediction endpoint
        run: |
          curl -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "age": 35,
              "gender": "Male",
              "tenure_months": 12,
              "monthly_spend": 250.5,
              "contract_type": "Monthly",
              "support_tickets": 2,
              "last_login_days": 15,
              "satisfaction_score": 7
            }' | python -m json.tool

  drift-detection:
    runs-on: ubuntu-latest
    needs: [save-artifacts]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download reference data
        uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/data/
      
      - name: Run drift detection
        run: python src/drift.py
      
      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: artifacts/reports/drift_report.json
      
      - name: Check if retraining needed
        id: check-drift
        run: |
          if [ -f "artifacts/reports/drift_report.json" ]; then
            DRIFT_SCORE=$(python -c "import json; d=json.load(open('artifacts/reports/drift_report.json')); print(d.get('drift_score', 0))")
            if (( $(echo "$DRIFT_SCORE > 0.2" | bc -l) )); then
              echo "retrain_needed=true" >> $GITHUB_OUTPUT
            else
              echo "retrain_needed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "retrain_needed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Trigger retraining
        if: steps.check-drift.outputs.retrain_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'retrain.yml',
              ref: 'main'
            })

  retrain-trigger:
    runs-on: ubuntu-latest
    needs: [drift-detection]
    if: always()
    steps:
      - name: Log retraining status
        run: |
          echo "## Retraining Status" >> $GITHUB_STEP_SUMMARY
          echo "- Drift detection completed" >> $GITHUB_STEP_SUMMARY
          echo "- Automatic retraining will be triggered if needed" >> $GITHUB_STEP_SUMMARY
          echo "- Scheduled retraining runs weekly" >> $GITHUB_STEP_SUMMARY

  notify:
    runs-on: ubuntu-latest
    needs: [test-api, drift-detection, upload-artifacts]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Create notification summary
        run: |
          cat > notification.md << 'EOF'
          # ML Pipeline Execution Report
          
          ## Overview
          - **Run ID**: ${{ github.run_id }}
          - **Run Number**: ${{ github.run_number }}
          - **Trigger**: ${{ github.event_name }}
          - **Status**: ${{ job.status }}
          - **Timestamp**: $(date)
          
          ## Jobs Executed
          - ✅ Setup Environment
          - ✅ Data Ingestion
          - ✅ Data Validation
          - ✅ Preprocessing
          - ✅ Feature Engineering
          - ✅ Model Training (3 models)
          - ✅ Model Evaluation
          - ✅ Best Model Selection
          - ✅ Artifact Saving
          - ✅ Report Generation
          - ✅ Docker Build
          - ✅ API Deployment
          - ✅ API Testing
          - ✅ Drift Detection
          
          ## Artifacts
          - Models saved to: `artifacts/models/`
          - Metrics saved to: `artifacts/metrics/`
          - Reports saved to: `artifacts/reports/`
          - Plots saved to: `artifacts/plots/`
          
          ## Next Steps
          - Monitor API performance
          - Review drift detection results
          - Schedule regular retraining as needed
          EOF
          
          cat notification.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload notification
        uses: actions/upload-artifact@v4
        with:
          name: notification
          path: notification.md
