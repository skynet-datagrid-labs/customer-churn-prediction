name: Full ML Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt

  generate-data:
    needs: setup-environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python scripts/generate_data.py
      - uses: actions/upload-artifact@v4
        with:
          name: data
          path: data/
          retention-days: 7

  ingest-data:
    needs: generate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: data
          path: data/
      - run: pip install -r requirements.txt
      - run: python src/ingest.py data/fictitious_company_data.xlsx
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: artifacts/raw_data.pkl
          retention-days: 7

  validate-data:
    needs: ingest-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/validate.py
      - uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: artifacts/validation_report.json
          retention-days: 7

  preprocess-data:
    needs: validate-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/preprocess.py
      - uses: actions/upload-artifact@v4
        with:
          name: preprocessed-data
          path: |
            artifacts/X_train.pkl
            artifacts/X_test.pkl
            artifacts/y_train.pkl
            artifacts/y_test.pkl
            artifacts/encoders.pkl
          retention-days: 7

  feature-engineering:
    needs: preprocess-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: preprocessed-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/feature_engineering.py
      - uses: actions/upload-artifact@v4
        with:
          name: feature-data
          path: |
            artifacts/X_train_fe.pkl
            artifacts/X_test_fe.pkl
            artifacts/scaler.pkl
          retention-days: 7

  train-logistic-regression:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py logistic_regression
      - uses: actions/upload-artifact@v4
        with:
          name: model-lr
          path: artifacts/model_logistic_regression.pkl
          retention-days: 7

  train-random-forest:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py random_forest
      - uses: actions/upload-artifact@v4
        with:
          name: model-rf
          path: artifacts/model_random_forest.pkl
          retention-days: 7

  train-xgboost:
    needs: feature-engineering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/train.py xgboost
      - uses: actions/upload-artifact@v4
        with:
          name: model-xgb
          path: artifacts/model_xgboost.pkl
          retention-days: 7

  evaluate-models:
    needs: [train-logistic-regression, train-random-forest, train-xgboost]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-lr
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-rf
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-xgb
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: |
          python src/evaluate.py logistic_regression
          python src/evaluate.py random_forest
          python src/evaluate.py xgboost
      - uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: artifacts/metrics_*.json
          retention-days: 7

  select-best-model:
    needs: evaluate-models
    runs-on: ubuntu-latest
    outputs:
      best_model: ${{ steps.select.outputs.best_model }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: metrics
          path: artifacts/
      - run: pip install -r requirements.txt
      - id: select
        run: python src/select_model.py
      - uses: actions/upload-artifact@v4
        with:
          name: best-model-info
          path: artifacts/best_model.json
          retention-days: 7

  save-artifacts:
    needs: [select-best-model, feature-engineering]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: best-model-info
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: metrics
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-lr
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-rf
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: model-xgb
          path: artifacts/
      - run: pip install -r requirements.txt
      - run: python src/save_model.py
      - uses: actions/upload-artifact@v4
        with:
          name: final-artifacts
          path: |
            artifacts/model.pkl
            artifacts/metrics.json
            reports/
          retention-days: 30

  generate-reports:
    needs: save-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: final-artifacts
          path: .
      - run: |
          echo "Metrics Summary:"
          cat artifacts/metrics.json
          echo "Confusion matrix and ROC curve saved in reports/"

  upload-artifacts:
    needs: generate-reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: final-artifacts
          path: .
      - uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: |
            artifacts/
            reports/
          retention-days: 30

  build-docker-image:
    needs: upload-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: production-artifacts
          path: .
      - run: docker build -t ml-churn-predictor:latest .
      - run: docker images | grep ml-churn-predictor

  deploy-and-test-api:
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: production-artifacts
          path: .
      - run: pip install -r requirements.txt
      - run: docker build -t ml-churn-predictor:latest .
      - run: docker run -d -p 8000:8000 --name ml-api ml-churn-predictor:latest
      - run: sleep 15
      - run: curl -f http://localhost:8000/health || exit 1
      - run: pytest tests/test_api.py -v
      - run: docker stop ml-api

  drift-detection:
    needs: deploy-and-test-api
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.set-output.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - id: drift
        run: python scripts/drift_detection.py
        continue-on-error: true
      - id: set-output
        run: |
          if [ "${{ steps.drift.outcome }}" == "failure" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift_report.json

  retrain-trigger:
    needs: drift-detection
    if: needs.drift-detection.outputs.drift_detected == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "Retraining triggered - would call gh workflow run retrain.yml"

  notify:
    needs: [deploy-and-test-api, drift-detection]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: |
          echo "Pipeline completed successfully"
          echo "Best model: ${{ needs.select-best-model.outputs.best_model }}"
