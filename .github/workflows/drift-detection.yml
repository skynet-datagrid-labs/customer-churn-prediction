name: Data Drift Detection

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Get current data
        run: |
          mkdir -p artifacts/data
          python src/ingest.py --production
      
      - name: Get reference data
        uses: actions/download-artifact@v4
        with:
          name: feature-data
          path: artifacts/data/
        continue-on-error: true
      
      - name: Run drift detection
        run: python src/drift.py
      
      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: artifacts/reports/drift_report.json
      
      - name: Check drift severity
        id: drift-check
        run: |
          if [ -f "artifacts/reports/drift_report.json" ]; then
            python -c "
            import json
            with open('artifacts/reports/drift_report.json') as f:
                report = json.load(f)
            score = report.get('drift_score', 0)
            print(f'Drift Score: {score}')
            if score > 0.3:
                print('::set-output name=severity::high')
            elif score > 0.2:
                print('::set-output name=severity::medium')
            else:
                print('::set-output name=severity::low')
            "
          fi
      
      - name: Create drift summary
        run: |
          echo "## Data Drift Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Severity**: ${{ steps.drift-check.outputs.severity }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Report**: artifacts/reports/drift_report.json" >> $GITHUB_STEP_SUMMARY
