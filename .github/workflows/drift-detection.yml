name: Daily Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt

  ingest-data:
    needs: setup-environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python scripts/generate_data.py
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: artifacts/raw_data.pkl
          retention-days: 7

  drift-check:
    needs: ingest-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: artifacts/
      - run: pip install -r requirements.txt
      - id: drift
        run: python scripts/drift_detection.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift_report.json
      - name: Trigger retrain if drift detected
        if: steps.drift.outcome == 'failure'
        run: |
          echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
          echo "Would trigger retrain.yml workflow here"
